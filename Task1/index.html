<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
       
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f7f6;
    color: #333;
}

header {
    text-align: center;
    padding: 2rem 0;
    background-color: #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.filter-buttons {
    margin-top: 1rem;
}

.filter-btn {
    padding: 0.5rem 1rem;
    margin: 0 0.25rem;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.3s, color 0.3s;
}

.filter-btn:hover, .filter-btn.active {
    background-color: #3498db;
    color: #fff;
    border-color: #3498db;
}


.gallery-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 1rem;
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
}


.gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: block; 
}

.gallery-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

.gallery-item img {
    width: 100%;
    height: 200px; 
    object-fit: cover; 
    display: block;
    transition: filter 0.3s ease;
}

.gallery-item:hover img {
    filter: brightness(0.7);
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    font-size: 1.2rem;
}

.gallery-item:hover .overlay {
    opacity: 1;
}


.lightbox {
    display: none; 
    position: fixed;
    z-index: 1000;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0, 0, 0, 0.9);
}

.lightbox-content {
    margin: auto;
    display: block;
    width: 80%;
    max-width: 800px;
    max-height: 80vh;
    object-fit: contain; 
    border-radius: 4px;
    box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
    animation: zoomIn 0.4s ease;
}

@keyframes zoomIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.caption {
    margin: auto;
    display: block;
    width: 80%;
    max-width: 800px;
    text-align: center;
    color: #ccc;
    padding: 10px 0;
    height: 50px;
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 35px;
    color: #f1f1f1;
    font-size: 40px;
    font-weight: bold;
    transition: 0.3s;
    cursor: pointer;
}

.close-btn:hover,
.close-btn:focus {
    color: #bbb;
    text-decoration: none;
    cursor: pointer;
}

.prev, .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    width: auto;
    padding: 16px;
    margin-top: -50px;
    color: white;
    font-weight: bold;
    font-size: 24px;
    transition: 0.6s ease;
    border-radius: 0 3px 3px 0;
    user-select: none;
    -webkit-user-select: none;
    background-color: rgba(0, 0, 0, 0.3);
}

.next {
    right: 0;
    border-radius: 3px 0 0 3px;
}

.prev {
    left: 0;
}

.prev:hover, .next:hover {
    background-color: rgba(0, 0, 0, 0.8);
}

@media only screen and (max-width: 768px) {
    .gallery-container {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        padding: 1rem;
    }
    
    .lightbox-content {
        width: 95%;
    }
    
    .prev, .next {
        font-size: 18px;
        padding: 12px;
    }
}
    </style>

</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Image Gallery</h1>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="city">City</button>
            <button class="filter-btn" data-filter="animals">Animals</button>
        </div>
    </header>

    <main class="gallery-container">
        </main>

    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Lightbox View">
        <div class="caption" id="caption"></div>
        <a class="prev" id="prev-btn">&#10094;</a>
        <a class="next" id="next-btn">&#10095;</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    
    const imageData = [
        { src: "img/image1.jpg", category: 'nature', caption: 'Alpine Lake' },
        { src: "img/image2.jpeg", category: 'nature', caption: 'Cuddled Up Pups' },
        { src: "img/image3.jpeg", category: 'nature', caption: 'Urban Exploration' },
        { src: "img/image4.jpeg", category: 'nature', caption: 'Misty Mountains' },
        { src: "img/image5.webp", category: 'nature', caption: 'Observant Owl' },
        { src: "img/image6.jpeg", category: 'nature', caption: 'City Lights at Night' },
        { src: "img/city1.jpeg", category: 'city', caption: 'Forest Path' },
        { src: "img/city2.jpeg", category: 'city', caption: 'Walrus on the Ice' },
        { src: "img/city3.jpeg", category: 'city', caption: 'Historic Architecture' },
        { src: "img/city4.jpeg", category: 'city', caption: 'Alpine Lake' },
        { src: "img/city5.jpeg", category: 'city', caption: 'Cuddled Up Pups' },
        { src: "img/city6.jpeg", category: 'city', caption: 'Urban Exploration' },
        { src: "img/Animal1.jpeg", category: 'animals', caption: 'Tiger' },
        { src: "img/Animal2.jpeg", category: 'animals', caption: 'Zebra' },
        { src: "img/Animal3.jpeg", category: 'animals', caption: 'Deer' },
        { src: "img/Animal4.jpeg", category: 'animals', caption: 'Lion' },
        { src: "img/Animal5.jpeg", category: 'animals', caption: 'Cat' },
        { src: "img/Animal6.jpeg", category: 'animals', caption: 'Animals' }
    ];

    const galleryContainer = document.querySelector('.gallery-container');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const captionText = document.getElementById('caption');
    const closeBtn = document.querySelector('.close-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    let currentIndex = 0;
    let visibleImages = [...imageData]; 

    
    function renderGallery(images) {
        galleryContainer.innerHTML = ''; 

        images.forEach((image, index) => {
            const item = document.createElement('div');
            item.classList.add('gallery-item');
            item.dataset.category = image.category;

            const img = document.createElement('img');
            img.src = image.src;
            img.alt = image.caption;

            const overlay = document.createElement('div');
            overlay.classList.add('overlay');
            overlay.innerHTML = `<span>${image.caption}</span>`;

            item.appendChild(img);
            item.appendChild(overlay);
            galleryContainer.appendChild(item);

            
            item.addEventListener('click', () => openLightbox(index));
        });
    }

    renderGallery(imageData); 

    filterButtons.forEach(button => {
        button.addEventListener('click', () => {
            document.querySelector('.filter-btn.active').classList.remove('active');
            button.classList.add('active');

            const filterValue = button.dataset.filter;

            if (filterValue === 'all') {
                visibleImages = imageData;
            } else {
                
                visibleImages = imageData.filter(image => image.category === filterValue);
            }

            renderGallery(visibleImages); 
        });
    });

    function openLightbox(index) {
        currentIndex = index;
        updateLightboxContent();
        lightbox.style.display = 'block';
        document.body.style.overflow = 'hidden'; 
    }

    function closeLightbox() {
        lightbox.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function updateLightboxContent() {
        if (visibleImages.length === 0) return;
        const currentImage = visibleImages[currentIndex];
        lightboxImg.src = currentImage.src;
        captionText.textContent = currentImage.caption;
    }

    function showNextImage() {
        currentIndex = (currentIndex + 1) % visibleImages.length; 
        updateLightboxContent();
    }

    function showPrevImage() {
        currentIndex = (currentIndex - 1 + visibleImages.length) % visibleImages.length; 
        updateLightboxContent();
    }

    closeBtn.addEventListener('click', closeLightbox);
    nextBtn.addEventListener('click', showNextImage);
    prevBtn.addEventListener('click', showPrevImage);

    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
            closeLightbox();
        }
    });
    
    document.addEventListener('keydown', (e) => {
        if (lightbox.style.display === 'block') {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') showNextImage();
            if (e.key === 'ArrowLeft') showPrevImage();
        }
    });
});
    </script>
</body>
</html>
